# =============================================================================
# Belgian Deal Finder API - Configuration
# =============================================================================

# Application
quarkus.application.name=deal-finder-api
quarkus.application.version=1.0.0

# =============================================================================
# Database Configuration
# =============================================================================

# Default (H2 for development)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/dealfinder;AUTO_SERVER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# =============================================================================
# Dev Profile
# =============================================================================
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.category."be.dealfinder".level=DEBUG

# =============================================================================
# Production — uses H2 in-memory by default (same as dev)
# To use PostgreSQL, activate the 'postgres' profile:
#   -Dquarkus.profile=postgres
# =============================================================================
%prod.quarkus.hibernate-orm.database.generation=update

# PostgreSQL profile (activate with -Dquarkus.profile=postgres)
%postgres.quarkus.datasource.db-kind=postgresql
%postgres.quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/dealfinder}
%postgres.quarkus.datasource.username=${DATABASE_USER:dealfinder}
%postgres.quarkus.datasource.password=${DATABASE_PASSWORD:dealfinder}
%postgres.quarkus.hibernate-orm.database.generation=update

# =============================================================================
# Scraper Configuration
# =============================================================================

# Enable/disable scraper
scraper.enabled=true

# Timeout for HTTP requests (milliseconds)
scraper.timeout=15000

# Delay between requests to be polite (milliseconds)
scraper.request-delay=2000

# User agent for requests
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# Schedule: Every day at 6:00 AM (and Saturday is priority for new folders)
scraper.schedule.cron=0 0 6 * * ?

# Auto-scrape on startup is automatic when DB is empty (no config needed)

# =============================================================================
# Product Extraction (Claude tool-use API)
# =============================================================================
# Set deal.product.extraction.api-key to your Anthropic API key to enable
deal.product.extraction.enabled=${DEAL_PRODUCT_EXTRACTION_ENABLED:false}
deal.product.extraction.api-key=${ANTHROPIC_API_KEY:not-set}
scraper.product-extraction.enabled=${SCRAPER_PRODUCT_EXTRACTION:false}

# =============================================================================
# Deal Configuration
# =============================================================================

# Minimum discount percentage to include (can be overridden by user filter)
# History: 20 → 50 (filtered 3 retailers entirely) → 15 (rescued them, +422 deals
# but ~$10-15/mo Haiku spend at 2x/day scrape) → 20 (sweet spot 2026-05-18 late).
# 20% keeps Spar + Colruyt fully, leaves MediaMarkt at minimum viable presence
# (its max discount is 20% so only edge cases qualify), and cuts Haiku spend
# roughly in half vs 15% (~$6/mo). Future: consider per-category threshold so
# electronics (low %, high €) doesn't get unfairly penalized.
deals.minimum-discount=20

# Days to keep expired deals visible (greyed out).
# 0 = hide on the day after validUntil. Set to 2026-05-18 because expired deals
# (79 / 1640, 4.8%) were anchoring lists and degrading "fresh" perception. The
# DTO still exposes `expired` + `daysExpired` so a future "expired" view could
# re-enable a 3-day grey-out window.
deals.expired-visible-days=0

# =============================================================================
# API Configuration
# =============================================================================

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-session-id,baggage,sentry-trace

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Belgian Deal Finder API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for aggregating multi-buy deals from Belgian retailers
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# =============================================================================
# Logging
# =============================================================================
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.category."io.quarkus".level=INFO

# =============================================================================
# Firebase Admin SDK (Firestore reads + FCM push send)
# =============================================================================
# Off in dev so it doesn't try to authenticate. Cloud Run sets firebase.enabled=true.
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.project-id=${FIREBASE_PROJECT_ID:promo-finder-be}

# =============================================================================
# Sentry (error monitoring via quarkus-logging-sentry)
# =============================================================================
# Dev runs silent unless SENTRY_DSN is set. Prod Cloud Run sets it.
quarkus.log.sentry.enabled=${SENTRY_ENABLED:false}
quarkus.log.sentry.dsn=${SENTRY_DSN:not-set}
quarkus.log.sentry.level=WARN
quarkus.log.sentry.in-app-packages=be.dealfinder
